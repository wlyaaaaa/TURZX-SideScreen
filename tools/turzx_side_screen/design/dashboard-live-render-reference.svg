      <rect x="0" y="44" width="96" height="22" rx="5" fill="#e0f2fe"/><text class="mono cpu" x="48" y="59" text-anchor="middle" font-size="11" font-weight="900">CPU 09%</text>
      <rect x="106" y="44" width="116" height="22" rx="5" fill="#dcfce7"/><text class="mono green" x="164" y="59" text-anchor="middle" font-size="11" font-weight="900">RAM 0.5G</text>
      <line class="line" x1="0" y1="74" x2="384" y2="74"/>
    </g>
    <g id="app-row-2" transform="translate(24 126)">
      <text class="sans dark" x="0" y="26" font-size="18" font-weight="900">Codex (Beta).exe</text>
      <rect x="0" y="44" width="96" height="22" rx="5" fill="#e0f2fe"/><text class="mono cpu" x="48" y="59" text-anchor="middle" font-size="11" font-weight="900">CPU 03%</text>
      <rect x="106" y="44" width="116" height="22" rx="5" fill="#dcfce7"/><text class="mono green" x="164" y="59" text-anchor="middle" font-size="11" font-weight="900">RAM 1.9G</text>
      <line class="line" x1="0" y1="74" x2="384" y2="74"/>
    </g>
    <g id="app-row-3" transform="translate(24 210)">
      <text class="sans dark" x="0" y="26" font-size="18" font-weight="900">python.exe</text>
      <rect x="0" y="44" width="96" height="22" rx="5" fill="#e0f2fe"/><text class="mono cpu" x="48" y="59" text-anchor="middle" font-size="11" font-weight="900">CPU 03%</text>
      <rect x="106" y="44" width="116" height="22" rx="5" fill="#dcfce7"/><text class="mono green" x="164" y="59" text-anchor="middle" font-size="11" font-weight="900">RAM 0.1G</text>
    </g>
  </g>

  <g id="health-card" transform="translate(24 1793)">
    <rect x="0" y="0" width="4" height="111" rx="2" fill="#059669"/>
    <rect class="card" x="8" y="0" width="424" height="111" rx="14"/>
    <text class="title green" x="24" y="28">系统状态</text>
    <circle cx="58" cy="64" r="10" fill="#d1fae5"/>
    <circle cx="58" cy="64" r="5" fill="#10b981"/>
    <text id="health-status" class="sans green" x="76" y="60" font-size="14" font-weight="800">诊断服务在线</text>
    <text id="health-detail" class="sans muted" x="76" y="78" font-size="9" font-weight="800">模块正常运转中</text>
    <line x1="184" y1="42" x2="184" y2="88" stroke="#d9f2e6" stroke-dasharray="3 3"/>
    <text class="sans muted" x="204" y="54" font-size="9" font-weight="800">DPC 延迟</text>
    <text id="dpc" class="mono dark" x="204" y="74" font-size="15" font-weight="800">315 us</text>
    <line x1="284" y1="42" x2="284" y2="88" stroke="#d9f2e6" stroke-dasharray="3 3"/>
