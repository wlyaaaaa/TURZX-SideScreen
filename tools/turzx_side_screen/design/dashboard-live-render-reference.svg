    <line x1="368" y1="42" x2="368" y2="88" stroke="#d9f2e6" stroke-dasharray="3 3"/>
    <text class="sans muted" x="382" y="54" font-size="8" font-weight="800">数据刷新</text>
    <text id="refresh" class="mono dark" x="382" y="74" font-size="15" font-weight="800">0.5s</text>
  </g>
</svg>
